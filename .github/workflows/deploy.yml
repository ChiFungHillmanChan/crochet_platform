name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CF_DISTRIBUTION_ID: ${{ secrets.CF_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:seo
      - run: pnpm build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2
      - name: Deploy static assets (long cache)
        run: |
          aws s3 sync out/_next/ "s3://${S3_BUCKET}/_next/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
      - name: Deploy product images (long cache)
        run: |
          aws s3 sync out/products/ "s3://${S3_BUCKET}/products/" \
            --cache-control "public, max-age=31536000, immutable"
      - name: Deploy generated assets (long cache)
        run: |
          if [ -d out/generated ]; then
            aws s3 sync out/generated/ "s3://${S3_BUCKET}/generated/" \
              --cache-control "public, max-age=31536000, immutable"
          fi
      - name: Deploy HTML and other files (no cache)
        run: |
          aws s3 sync out/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "_next/*" \
            --exclude "products/*" \
            --exclude "generated/*" \
            --cache-control "public, max-age=0, must-revalidate"
      - name: Set long cache on root-level images
        run: |
          for IMG in icon.png hero-bg.png favicon.png favicon.ico; do
            if aws s3 ls "s3://${S3_BUCKET}/$IMG" > /dev/null 2>&1; then
              aws s3 cp "s3://${S3_BUCKET}/$IMG" "s3://${S3_BUCKET}/$IMG" \
                --cache-control "public, max-age=31536000, immutable" \
                --metadata-directive REPLACE
            fi
          done
      - name: Fix MIME types
        run: |
          aws s3 cp "s3://${S3_BUCKET}/sitemap.xml" "s3://${S3_BUCKET}/sitemap.xml" \
            --content-type "application/xml" \
            --cache-control "public, max-age=3600" \
            --metadata-directive REPLACE
          aws s3 cp "s3://${S3_BUCKET}/robots.txt" "s3://${S3_BUCKET}/robots.txt" \
            --content-type "text/plain" \
            --cache-control "public, max-age=3600" \
            --metadata-directive REPLACE
          aws s3 cp "s3://${S3_BUCKET}/manifest.json" "s3://${S3_BUCKET}/manifest.json" \
            --content-type "application/manifest+json" \
            --cache-control "public, max-age=86400" \
            --metadata-directive REPLACE
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${CF_DISTRIBUTION_ID}" --paths "/*"
